{% extends 'base.html' %}

{% block content %}
  <article class="content-card">
    <div class="card-head"><h3>Tracking Updates</h3></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Order</th><th>Stage</th><th>Department</th><th>Handler</th><th>Last Update</th></tr></thead>
        <tbody>
          {% for o in orders %}
            <tr class="search-target">
              <td><strong>{{ o.id }}</strong></td>
              <td><span class="pill {{ o.status|lower }}">{{ o.status }}</span></td>
              <td>{{ o.department }}</td>
              <td>{{ o.handler }}</td>
              <td>{{ o.updated }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </article>
{% endblock %}
