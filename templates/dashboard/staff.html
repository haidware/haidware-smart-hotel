{% extends 'base.html' %}

{% block content %}
  <article class="content-card">
    <form class="form-grid four">
      <input placeholder="Staff name">
      <input placeholder="Email">
      <select>
        <option>Manager</option><option>Kitchen Staff</option><option>Bar Staff</option>
        <option>Reception</option><option>Housekeeping</option><option>Admin</option>
      </select>
      <button class="primary-btn" type="submit">Add Staff</button>
    </form>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>
          {% for s in staff_members %}
            <tr class="search-target">
              <td><strong>{{ s.name }}</strong></td>
              <td>{{ s.email }}</td>
              <td>{{ s.role }}</td>
              <td><span class="pill {{ s.status|lower }}">{{ s.status }}</span></td>
              <td>
                <button class="mini" type="button">Edit</button>
                <button class="mini danger" type="button">Remove</button>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </article>
{% endblock %}
